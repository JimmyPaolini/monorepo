services:
  devcontainer:
    image: mcr.microsoft.com/devcontainers/typescript-node:22-bookworm
    container_name: monorepo-devcontainer
    privileged: true
    volumes:
      - ../..:/workspaces/monorepo:cached
      - monorepo-node-modules:/workspaces/monorepo/node_modules
      - monorepo-pnpm:/root/.local/share/pnpm
      - monorepo-docker:/var/lib/docker
    env_file:
      # The monorepo root level .env file (copied from .env.default in CI)
      - ../../.env
    deploy:
      resources:
        limits:
          memory: 6g
    command: sleep infinity

volumes:
  monorepo-node-modules:
    name: monorepo-node-modules
  monorepo-pnpm:
    name: monorepo-pnpm
  monorepo-docker:
    name: monorepo-docker
