version: "0.2"
language: en
useGitignore: true
$schema: https://raw.githubusercontent.com/streetsidesoftware/cspell/main/cspell.schema.json
ignorePaths:
  - ./.devcontainer/devcontainer.json
  - .git
  - .nx
  - "*.eot"
  - "*.gif"
  - "*.ico"
  - "*.jpeg"
  - "*.jpg"
  - "*.lock"
  - "*.png"
  - "*.svg"
  - "*.ttf"
  - "*.woff"
  - "*.woff2"
  - "**/.terraform/**"
  - "**/*.gen.ts"
  - "**/*.min.css"
  - "**/*.min.js"
  - "**/CHANGELOG.md"
  - "**/coverage"
  - "**/dist"
  - "**/supabase/data.sql"
  - "**/applications/lexico-ingestion/data/**"
  - "**/applications/lexico-ingestion/src/modules/literature/literature.constants.ts"
  - "**/applications/lexico-ingestion/src/modules/library/library.constants.ts"
  - "**/documentation/planning/**"
  - "**/.agents/skills/brainstorming/**"
  - "**/.agents/skills/dispatching-parallel-agents/**"
  - "**/.agents/skills/executing-plans/**"
  - "**/.agents/skills/finishing-a-development-branch/**"
  - "**/.agents/skills/receiving-code-review/**"
  - "**/.agents/skills/requesting-code-review/**"
  - "**/.agents/skills/subagent-driven-development/**"
  - "**/.agents/skills/systematic-debugging/**"
  - "**/.agents/skills/test-driven-development/**"
  - "**/.agents/skills/using-git-worktrees/**"
  - "**/.agents/skills/using-superpowers/**"
  - "**/.agents/skills/verification-before-completion/**"
  - "**/.agents/skills/writing-plans/**"
  - "**/.agents/skills/writing-skills/**"
  - "**/node_modules"
  - "**/packages/lexico-components/src/components/**"
  - "**/packages/lexico-components/src/hooks/**"
  - "**/packages/lexico-components/src/lib/**"
  - "**/pnpm-lock.yaml"
  - "**/routeTree.gen.ts"
  - "**/terraform.tfstate*"
  - coverage
  - dist
  - applications/lexico-ingestion/data/**
dictionaryDefinitions:
  - name: astronomy
    path: .cspell/astronomy.txt
  - name: ics
    path: .cspell/ics.txt
  - name: lexico
    path: .cspell/lexico.txt
  - name: affirmations
    path: .cspell/affirmations.txt
  - name: ai
    path: .cspell/ai.txt
  - name: python
    path: .cspell/python.txt
  - name: infrastructure
    path: .cspell/infrastructure.txt
  - name: tooling
    path: .cspell/tooling.txt
    addWords: true
# flagWords:
#   - arr
#   - auth
#   - bg
#   - bool
#   - char
#   - col
#   - ctx
#   - cur
#   - curr
#   - db
#   - el
#   - hex
#   - idx
#   - nav
#   - num
#   - obj
#   - param
#   - pkg
#   - prop
#   - px
#   - req
#   - res
#   - ret
#   - src
#   - stg
#   - tmp
#   - txt
#   - util
#   - val
enableFiletypes:
  - markdown
  - typescript
  - javascript
  - yaml
  - json
  - jsonc
  - python
  - shellscript
  - sql
  - terraform
  - toml
dictionaries:
  - typescript
  - node
  - npm
  - html
  - css
  - bash
  - astronomy
  - ics
  - lexico
  - affirmations
  - ai
  - python
  - infrastructure
  - tooling
patterns:
  - name: notebook-outputs
    pattern: /"outputs"\s*:\s*\[(?:[^\[\]]*|\[(?:[^\[\]]*|\[(?:[^\[\]]*|\[[^\[\]]*\])*[^\[\]]*\])*[^\[\]]*\])*[^\[\]]*\]/g
overrides:
  - filename: "**/*.ipynb"
    ignoreRegExpList:
      - notebook-outputs
  - filename: "**/lexico-ingestion/data/**"
    enabled: false
