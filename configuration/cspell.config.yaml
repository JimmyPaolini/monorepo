  - typescript
  - javascript
  - yaml
  - json
  - jsonc
  - python
  - shellscript
  - sql
  - terraform
  - toml
dictionaries:
  - typescript
  - node
  - npm
  - html
  - css
  - bash
  - astronomy
  - ics
  - nasa-horizons
  - lexico
  - affirmations
  - ai
  - python
  - infrastructure
  - tooling
patterns:
  - name: notebook-outputs
    pattern: /"outputs"\s*:\s*\[(?:[^\[\]]*|\[(?:[^\[\]]*|\[(?:[^\[\]]*|\[[^\[\]]*\])*[^\[\]]*\])*[^\[\]]*\])*[^\[\]]*\]/g
overrides:
  - filename: "**/*.ipynb"
    ignoreRegExpList:
      - notebook-outputs
  - filename: "**/lexico-ingestion/data/**"
    enabled: false
