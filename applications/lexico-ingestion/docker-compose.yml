services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: lexico
      POSTGRES_PASSWORD: lexico
      POSTGRES_DB: lexico
    ports:
      - "5432:5432"
    volumes:
      - lexico_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexico"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  lexico_postgres_data:
