# SearxNG configuration for affirmations application
# Enables key search engines for spiritual practice research
#
# Architecture: this file is mounted into the SearxNG container and layered on top of
# SearxNG's built-in defaults via `use_default_settings: true`. Only keys specified
# here override the defaults; everything else inherits the upstream values.
# See: https://docs.searxng.org/admin/settings/settings.html

# Merge with SearxNG's built-in default settings rather than replacing them.
# This means any engine or setting not listed here uses the upstream default.
use_default_settings: true

general:
  debug: false                        # set true to expose stack traces in the UI
  instance_name: Affirmations SearxNG

server:
  # Used to sign cookies and CSRF tokens. Must be changed for any internet-exposed deployment.
  secret_key: affirmations-searxng-secret-key-change-in-production
  # Rate limiter disabled: this instance is only queried by the LangGraph agent, not end users
  limiter: false
  # Not a public instance — disables the "join public instance" UI banner
  public_instance: false

ui:
  # Disable content-hash suffixes on static assets (simpler caching for a private instance)
  static_use_hash: false
  default_locale: en
  default_theme: simple

search:
  # 0 = off, 1 = moderate, 2 = strict. Off because occult/spiritual content
  # is frequently misclassified as unsafe by content filters.
  safe_search: 0
  # No autocomplete provider — queries are generated by the LangGraph agent, not typed by a human
  autocomplete: ""
  default_lang: en
  formats:
    - html   # used by the browser UI
    - json   # used by the LangGraph agent's SearxNG tool
  # Reduce suspend times so engines recover quickly in dev.
  # An engine that fails once (e.g. a brief CAPTCHA) will resume after 5s instead of being
  # locked for the full default ban window, which helps during iterative notebook runs.
  ban_time_on_fail: 5       # seconds before a failing engine is retried (default: 5)
  max_ban_time_on_fail: 30  # cap on exponential backoff (default: 120)
  suspended_times:
    SearxEngineAccessDenied: 3600     # 1h (default: 24h)
    SearxEngineCaptcha: 3600          # 1h (default: 24h)
    SearxEngineTooManyRequests: 600   # 10m (default: 1h)
    # Cloudflare-specific variants of the above
    cf_SearxEngineCaptcha: 3600
    cf_SearxEngineAccessDenied: 3600
    recaptcha_SearxEngineCaptcha: 3600

# Hostnames plugin: boost trusted sources to the top of results.
# The plugin only activates when a `hostnames:` key is present.
# Patterns are Python regexes matched against the full hostname.
# Three lists are supported:
#   high_priority — matching results are sorted to the top
#   low_priority  — matching results are sorted toward the bottom
#   remove        — matching results are excluded entirely
plugins:
  searx.plugins.hostnames.SXNGPlugin:
    active: true

hostnames:
  high_priority:
    # Cross-category primary and secondary source archives — cover texts used across all subject areas
    - (.*\.)?sacred-texts\.com$   # largest free archive of world religious/occult texts (Crowley, Waite, Levi, etc.)
    - (.*\.)?hermetic\.com$       # Hermetic Library: Golden Dawn, Thelema, and Western esoteric primary sources

    # tarot — RWS-tradition card meaning references
    - (.*\.)?biddytarot\.com$      # most-cited beginner/intermediate reference; upright + reversed
    - (.*\.)?labyrinthos\.co$      # also covers lenormand and oracle; clean keyword summaries
    - (.*\.)?learntarot\.com$      # Joan Bunning's classic structured course
    - (.*\.)?tarot\.com$           # comprehensive meanings + spreads
    - (.*\.)?thetarotguide\.com$
    - (.*\.)?tarotinstitute\.com$
    - (.*\.)?selfgazer\.com$
    - (.*\.)?tarotprophetess\.com$
    - (.*\.)?tarotteachings\.com$

    # lenormand
    - (.*\.)?lenormandreader\.com$   # all 36 card meanings, active as of 2026
    - (.*\.)?learnlenormand\.com$
    - (.*\.)?marykgreer\.com$        # Mary K. Greer: scholarly cartomancy/lenormand history (18+ lenormand posts)

    # astrology — sign/planet/house meanings and chart interpretation
    - (.*\.)?astro\.com$            # Astrodienst: professional-grade charts and interpretation texts
    - (.*\.)?cafeastrology\.com$    # planet/house/aspect meanings; widely cited
    - (.*\.)?astrostyle\.com$
    - (.*\.)?astrotheme\.com$       # celebrity chart database + in-depth planet interpretations
    - (.*\.)?astrology42\.com$
    - (.*\.)?darkstarastrology\.com$ # fixed stars and asteroids — rare content not on mainstream sites
    - (.*\.)?astrologyhub\.com$
    - (.*\.)?skyscript\.co\.uk$    # traditional/classical astrology; Lilly, Bonatti source commentary
    - (.*\.)?astro-seek\.com$      # aspect and transit calculators with textual interpretations
    - (.*\.)?theoi\.com$           # Greek mythology site; included for asteroid names (Ceres, Pallas, Juno, Vesta)

    # chakras — energy body, kundalini, and Ayurvedic resonance content
    - (.*\.)?yogajournal\.com$
    - (.*\.)?yogainternational\.com$
    - (.*\.)?chopra\.com$           # Deepak Chopra Institute: chakra/meditation/Ayurveda
    - (.*\.)?mindbodygreen\.com$
    - (.*\.)?ekhartyoga\.com$
    - (.*\.)?gaia\.com$             # streaming/editorial platform; in-depth chakra and esoteric articles

    # runes — Elder/Younger Futhark meanings, Norse mythology context
    - (.*\.)?runesecrets\.com$      # detailed divinatory and esoteric meanings per rune
    - (.*\.)?vikingrune\.com$       # historical and magical meanings with Norse cosmology
    - (.*\.)?norse-mythology\.org$  # scholarly Norse mythology reference
    - (.*\.)?symbolsandmeanings\.net$ # cross-category: runes, alchemy, chakra symbols

    # kabbalah — Tree of Life, Sephiroth, Hebrew letters, and gematria
    - (.*\.)?chabad\.org$           # Chabad-Lubavitch: authoritative Chassidic/Kabbalistic texts
    - (.*\.)?sefaria\.org$          # open-source library of Jewish texts including Zohar and Sefer Yetzirah
    - (.*\.)?inner\.org$            # Gal Einai Institute — Kabbalistic commentary on Hebrew letters
    - (.*\.)?kabbalahcentre\.org$   # Western/Hermetic Kabbalah oriented toward spiritual practice
    - (.*\.)?jewishvirtuallibrary\.org$ # encyclopedic reference for historical and textual context

    # Western esoteric primary sources — Agrippa, Dee, and Ficino planetary/elemental correspondences
    # that underpin associations across tarot, astrology, alchemy, kabbalah, and gemstones
    - (.*\.)?esotericarchives\.com$ # Twilit Grotto: full text of Agrippa's Three Books, Key of Solomon, etc.
    - (.*\.)?llewellyn\.com$        # Llewellyn encyclopedia: practitioner-oriented magical reference

    # gemstones — metaphysical properties, chakra associations, and mineralogy
    - (.*\.)?crystalvaults\.com$    # comprehensive metaphysical crystal encyclopedia
    - (.*\.)?energymuse\.com$       # crystal healing meanings and intention-setting
    - (.*\.)?healingcrystals\.com$
    - (.*\.)?gia\.edu$              # Gemological Institute of America — scientific authority (balances practitioner sites)
    - (.*\.)?mindat\.org$           # mineralogy database; mineral composition and properties

    # numerology — life path, expression, and soul urge number meanings
    - (.*\.)?numerology\.com$
    - (.*\.)?worldnumerology\.com$  # Hans Decoz — most cited numerology authority; author of Numerology; Key to Your Inner Self
    - (.*\.)?affinitynumerology\.com$
    - (.*\.)?numerologist\.com$

    # alchemy — Hermetic stages, symbols, and elemental transmutation
    - (.*\.)?alchemywebsite\.com$   # Adam McLean: scholarly alchemy symbol dictionary and manuscript images
    - (.*\.)?rexresearch\.com$      # archive of fringe science and alchemical process literature

    # cross-category correspondences: elements, colors, weekdays, metals, deities
    - (.*\.)?witchipedia\.com$      # Witches' Sabbat wiki: magical correspondences and folk practice
    - (.*\.)?learnreligions\.com$   # ThoughtCo religion vertical: world religions and symbol meanings
    - (.*\.)?thoughtco\.com$        # general reference; mythology, history, and occult topics
    - (.*\.)?ancient-symbols\.com$  # symbol etymology and cross-cultural meanings

    # solfeggio frequencies — 396 Hz, 528 Hz, etc. and their healing/chakra associations
    - (.*\.)?musictheory\.net$      # included for interval and harmonic theory context
    - (.*\.)?somaenergetics\.com$   # Solfeggio frequency research — not a general music theory site

    # encyclopedic references — broad coverage across all subject categories
    - (.*\.)?wikipedia\.org$
    - (.*\.)?wikidata\.org$          # structured entity data; useful for canonical names and relationships
  low_priority:
    # Tarot sites with thin or outdated content — present but not authoritative
    - (.*\.)?tarostarot\.com$
    - (.*\.)?thetarotlady\.com$
    # Deprioritised because they generate low-quality SEO content rather than authoritative guidance
    - (.*\.)?wikihow\.com$
    - (.*\.)?quora\.com$
    - (.*\.)?facebook\.com$
    - (.*\.)?coursera\.org$
    # Deprioritised because dictionary definitions lack the interpretive depth needed for affirmations
    - (.*\.)?dictionary\.cambridge\.org$
    - (.*\.)?dictionary\.com$
    - (.*\.)?vocabulary\.com$
    - (.*\.)?merriam-webster\.com$
    # Generic horoscope generators — useful for basic sign keywords but lack interpretive depth
    - (.*\.)?horoscope\.com$
    - (.*\.)?astrology\.com$
    - (.*\.)?keen\.com$              # psychic reading marketplace, not educational
    - (.*\.)?astrologyzone\.com$     # monthly horoscopes, thin on symbolism
  remove:
    # Non-English content farms that surface for many spiritual search terms
    - (.*\.)?zhihu\.com$
    # Medical authority site — appears for chakra/healing queries but adds nothing for affirmations
    - (.*\.)?health\.clevelandclinic\.org$
    # Images-only sites: no prose, scraping-resistant, waste result slots
    - (.*\.)?pinterest\.com$
    - (.*\.)?pinterest\.co\.uk$
    # Affiliate/marketplace sites that dominate gemstone/crystal queries
    - (.*\.)?etsy\.com$
    - (.*\.)?amazon\.com$

# Higher timeouts for LLM use: slow engines still return useful content
# and the LLM can tolerate extra latency better than a human waiting for a UI
outgoing:
  request_timeout: 8.0     # default is 2.0 — too low, causes many engine timeouts
  max_request_timeout: 15.0

engines:
  # ── Tier 1: primary source texts ──────────────────────────────────────────────────────────────
  # Highest weight: when these engines return a result it is the most valuable LLM source material.
  # They rarely overlap with general web engines, so weight mainly acts as a tiebreak.

  # Wikisource: cleanly transcribed public-domain primary texts (disabled by default in SearxNG)
  - name: wikisource
    engine: mediawiki
    url: https://en.wikisource.org/
    number_of_results: 5
    categories: general
    shortcut: ws
    disabled: false
    weight: 2.0

  # Open Library (archive.org): full text of out-of-copyright occult books —
  # Waite's Pictorial Key (1910), Papus' Tarot of the Bohemians, Etteilla, De Gébelin, etc.
  # Disabled by default in SearxNG
  - name: openlibrary
    engine: openlibrary
    categories: general
    shortcut: ol
    disabled: false
    weight: 2.0

  # ── Tier 2: encyclopedic / high-trust web ────────────────────────────────────────────────────
  # weight 1.5 so these win deduplication when multiple engines return the same URL.

  # Wikipedia: primary prose encyclopedic reference; enabled by default but listed explicitly
  # so its presence is visible next to the other engine choices
  - name: wikipedia
    engine: wikipedia
    categories: general
    shortcut: wp
    disabled: false
    weight: 1.5

  # Startpage: proxies Google's index via an official partnership — Google quality without
  # triggering rate limits or CAPTCHAs; wins dedup over Bing for the same Google-indexed results
  - name: startpage
    engine: startpage
    categories: general
    shortcut: sp
    disabled: false
    weight: 1.5

  # ── Tier 3: practitioner community ───────────────────────────────────────────────────────────
  # Reddit spiritual communities (r/tarot, r/lenormand, r/astrology) have rich real-world
  # interpretive discussions that ground affirmations in practitioner language

  - name: reddit
    engine: reddit
    categories: social_media
    shortcut: re
    disabled: false
    weight: 1.2

  # ── Tier 4: general web ───────────────────────────────────────────────────────────────────────
  # Broad coverage engines; DuckDuckGo as baseline, then independent (Brave), then commercial (Bing)

  # DuckDuckGo: privacy-first, no personalisation bias; broad independent coverage
  - name: duckduckgo
    engine: duckduckgo
    categories: general
    shortcut: ddg
    disabled: false
    weight: 1.0

  # Brave Search: independent index (not Bing/Google-derived); finds niche spiritual content
  # that personalised indexes may bury
  - name: brave
    engine: brave
    categories: general
    shortcut: brave
    disabled: false
    weight: 0.9

  # Bing: widest coverage after Google but most commercial/SEO bias; loses dedup to Startpage
  # for the same result
  - name: bing
    engine: bing
    categories: general
    shortcut: bi
    disabled: false
    weight: 0.7

  # ── Disabled ──────────────────────────────────────────────────────────────────────────────────

  # Google: disabled — Startpage proxies the same index without triggering rate limits or CAPTCHAs,
  # making the direct scraper redundant
  - name: google
    engine: google
    categories: general
    shortcut: go
    disabled: true

  # Wikidata: returns structured JSON-LD entity records, not prose — unhelpful for LLM source
  # material; Wikipedia covers the same topics with actual readable text
  - name: wikidata
    engine: wikidata
    categories: general
    shortcut: wd
    disabled: true
