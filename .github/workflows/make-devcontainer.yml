name: 🧑‍🔧 Make Devcontainer

on:
  push:
    branches:
      - main
    paths:
      - .devcontainer/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  make-devcontainer:
    name: 🧑‍🔧 Make Devcontainer
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🕋 Setup Monorepo
        uses: ./.github/actions/setup-monorepo

      - name: 🧩 Check VSCode Extensions
        run: npx nx run monorepo:sync-vscode-extensions:check

      - name: 🗂️ Setup Environment File
        run: cp .env.default .env

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Make Devcontainer
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/cloud/devcontainer.json
          imageName: ghcr.io/jimmypaolini/monorepo-devcontainer
          cacheFrom: |
            type=gha,scope=devcontainer
            ghcr.io/jimmypaolini/monorepo-devcontainer
          push: filter
          eventFilterForPush: |
            push:
              branches:
                - main
          env: CI=true

      - name: 🔬 Test Devcontainer
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/cloud/devcontainer.json
          imageName: ghcr.io/jimmypaolini/monorepo-devcontainer
          cacheFrom: |
            type=gha,scope=devcontainer
            ghcr.io/jimmypaolini/monorepo-devcontainer
          push: never
          env: CI=true
          runCmd: |
            bash .devcontainer/scripts/test-devcontainer.sh
