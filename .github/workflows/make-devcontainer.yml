name: 🧑‍🔧 Make Devcontainer

on:
  push:
    branches:
      - main
    paths:
      - .devcontainer/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  make-devcontainer:
    name: 🧑‍🔧 Make Devcontainer
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🕋 Setup Monorepo
        uses: ./.github/actions/setup-monorepo

      - name: 🧩 VSCode Extensions Validation
        run: npx nx run monorepo:sync-vscode-extensions:check

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Make Devcontainer
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/jimmypaolini/monorepo-devcontainer
          cacheFrom: |
            type=gha,scope=devcontainer
            ghcr.io/jimmypaolini/monorepo-devcontainer
          cacheTo: type=gha,mode=max,scope=devcontainer
          push: filter
          eventFilterForPush: |
            push:
              branches:
                - main
          env: CI=true

      - name: 🩹 Patch Configuration for Test
        run: |
          # Only the cloud devcontainer.json (DinD configuration) is built
          # and tested in CI. The local/devcontainer.json (DooD configuration)
          # is for local machines only and is not tested here.
          #
          # Remove resource-limiting Docker run args unsupported in
          # CI environments. Remove named volume mounts so the pnpm
          # store pre-baked into the image is visible (volumes would
          # otherwise shadow it with empty directories).
          JQ_FILTER='
            .runArgs |= map(select(
              . != "--env-file" and
              . != "${localWorkspaceFolder}/.env" and
              (test("^--(cpus|memory|memory-swap)") | not)
            )) |
            .mounts = []
          '
          jq "$JQ_FILTER" .devcontainer/cloud/devcontainer.json > \
            /tmp/devcontainer.json
          mv /tmp/devcontainer.json \
            .devcontainer/cloud/devcontainer.json

      - name: 🔬 Test Devcontainer
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/cloud/devcontainer.json
          imageName: ghcr.io/jimmypaolini/monorepo-devcontainer
          cacheFrom: |
            type=gha,scope=devcontainer
            ghcr.io/jimmypaolini/monorepo-devcontainer
          push: never
          env: CI=true
          runCmd: |
            bash .devcontainer/scripts/test-devcontainer.sh
