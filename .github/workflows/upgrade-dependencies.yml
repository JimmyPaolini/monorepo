name: 🧑‍🚒 Upgrade Dependencies

on:
  schedule:
    - cron: 0 10 * * 0
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  upgrade-dependencies:
    name: 🧑‍🚒 Upgrade Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🕋 Setup Monorepo
        uses: ./.github/actions/setup-monorepo

      - name: ⬆️ Upgrade pnpm
        run: |
          pnpm self-update
          LATEST_PNPM=$(pnpm --version)
          jq --arg v "pnpm@${LATEST_PNPM}" '.packageManager = $v' package.json > package.json.tmp && mv package.json.tmp package.json

      - name: ⬆️ Upgrade node
        run: |
          source ~/.nvm/nvm.sh
          LATEST_NODE=$(nvm version-remote lts/* | sed 's/v//')
          echo "v${LATEST_NODE}" > .nvmrc
          jq --arg v ">=${LATEST_NODE}" '.engines.node = $v' package.json > package.json.tmp && mv package.json.tmp package.json

      - name: ⬆️ Upgrade Dependencies
        run: pnpm exec nx run monorepo:upgrade-dependencies:write

      - name: 🔍 Detect Upgrades
        id: check
        run: |
          if git diff --quiet; then
            echo "has_dependency_updates=false" >> $GITHUB_OUTPUT
          else
            echo "has_dependency_updates=true" >> $GITHUB_OUTPUT
          fi

      - name: ⛔ Close Pull Requests
        if: steps.check.outputs.has_dependency_updates == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr list --head chore/dependencies-upgrade \
            --state open --json number --jq '.[].number' | \
            while read -r pr_number; do
              echo "Closing stale PR #$pr_number"
              gh pr close "$pr_number" \
                --comment "Closing in favor of new automated chore/dependencies-upgrade PR."
            done

      - name: 🔐 Import GPG Key
        if: steps.check.outputs.has_dependency_updates == 'true'
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: 🔀 Open Pull Request
        if: steps.check.outputs.has_dependency_updates == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(dependencies): ⬆️ Upgrade"
          branch: chore/dependencies-upgrade
          delete-branch: true
          title: "chore(dependencies): ⬆️ Upgrade"
          body: |
            ## 🌰 Summary

            Automated dependency updates detected by the weekly dependency check.

            ## 📝 Details

            - Update node to latest patch of current major
            - Update pnpm to latest version
            - Update dependencies across all workspace projects
            - Update pnpm lockfile

            ## 🧪 Testing

            1. Review changes in the diff
            2. Verify all code checks pass
            3. Test functionality manually (if needed)

            ## 🔗 Related

            - *Generated by [🧑‍🚒 Upgrade Dependencies](${{ format(
              'https://github.com/{0}/actions/workflows/upgrade-dependencies.yml',
              github.repository) }})*
          labels: |
            dependencies
            automated
