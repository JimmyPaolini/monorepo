name: 🧑‍⚖️ Validate Conventions

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-conventions:
    name: 🧑‍⚖️ Validate Conventions
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🕋 Setup Monorepo
        uses: ./.github/actions/setup-monorepo

      - name: 🎋 Validate Branch Name
        if: github.event_name == 'pull_request'
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          if [ -z "$BRANCH_NAME" ]; then
            echo "❌ Unable to determine Branch Name"
            exit 1
          fi
          pnpm exec validate-branch-name -t "$BRANCH_NAME"

      - name: 📝 Validate Pull Request Title
        if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'dependabot/') && !startsWith(github.head_ref, 'renovate/')
        env:
          PULL_REQUEST_TITLE: ${{ github.event.pull_request.title }}
          NODE_OPTIONS: --import=tsx
        run: |
          if [ -z "$PULL_REQUEST_TITLE" ]; then
            echo "❌ Unable to determine Pull Request Title"
            exit 1
          fi
          echo "$PULL_REQUEST_TITLE" | pnpm exec commitlint --config configuration/commitlint.config.ts

      - name: 🪢 Validate Pull Request Body
        if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'dependabot/') && !startsWith(github.head_ref, 'renovate/')
        env:
          PULL_REQUEST_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -z "$PULL_REQUEST_BODY" ]; then
            echo "❌ Unable to determine Pull Request Body"
            exit 1
          fi
          MISSING=""
          printf '%s' "$PULL_REQUEST_BODY" | grep -q "^## 🌰 Summary" || \
            MISSING="$MISSING 🌰 Summary"
          printf '%s' "$PULL_REQUEST_BODY" | grep -q "^## 📝 Details" || \
            MISSING="$MISSING 📝 Details"
          printf '%s' "$PULL_REQUEST_BODY" | grep -q "^## 🧪 Testing" || \
            MISSING="$MISSING 🧪 Testing"
          printf '%s' "$PULL_REQUEST_BODY" | grep -q "^## 🔗 Related" || \
            MISSING="$MISSING 🔗 Related"
          if [ -n "$MISSING" ]; then
            echo "❌ Missing required sections:$MISSING"
            echo ""
            echo "PR description must include: ## 🌰 Summary, " \
              "## 📝 Details, ## 🧪 Testing, ## 🔗 Related"
            echo "See: .github/PULL_REQUEST_TEMPLATE.md"
            exit 1
          fi
          echo "✅ All required sections present"

      - name: 🏛️ Validate Convention Configuration
        run: npx nx run synchronization:conventional-config:check

      - name: 📋 Validate Pull Request Template
        run: npx nx run synchronization:pull-request-template:check

      - name: 💡 Validate Agent Skills
        run: npx nx run synchronization:agent-skills:check

      - name: 🤖 Validate Plan Agents
        run: npx nx run synchronization:plan-agents:check

      - name: 🚨 Validate Triage Agents
        run: npx nx run synchronization:triage-agents:check

      - name: 📋 Validate Custom Agents
        run: npx nx run synchronization:custom-agents:check

      - name: 🧩 Validate Conformance Generators
        run: npx nx run synchronization:conformance-generators:check

      - name: 📊 Validate Code Statistics
        run: npx nx run monorepo:measure-code:check
