name: ✂️ Remove Deprecations

on:
  schedule:
    - cron: 0 6 * * 0 # Weekly Sunday 6am UTC
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  remove-deprecations:
    name: ✂️ Remove Deprecations
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🕋 Setup Monorepo
        uses: ./.github/actions/setup-monorepo

      - name: 🗑️ Close Previous PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list \
            --head chore/monorepo-remove-deprecations \
            --json number --jq '.[0].number')
          if [[ -n "$PR_NUMBER" ]]; then
            gh pr close "$PR_NUMBER" --delete-branch \
              --comment "Closed in favor of by new cleanup run"
          fi

      - name: ✂️ Remove Deprecations
        env:
          FALLOW_APPLY: "false"
        run: |
          pnpm exec nx run monorepo:clean:write || true
          # Safe dry-run only.
          # Previews fallow changes without modifying files.
          pnpm exec nx run monorepo:fallow-fix:check || true
          # Apply mode is disabled by default.
          # Set FALLOW_APPLY=true to enable fallow-fix:write.
          # Set or keep FALLOW_APPLY=false for immediate rollback.
          if [[ "${FALLOW_APPLY:-false}" == "true" ]]; then
            pnpm exec nx run monorepo:fallow-fix:write || true
          fi

      - name: 🔐 Import GPG Key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: 🔀 Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(monorepo): ✂️ Remove deprecations"
          title: "chore(monorepo): ✂️ Remove deprecations"
          body: |
            ## 🌰 Summary

            Automated removal of deprecated code, files, and dependencies.

            ## 📝 Details

            - Remove unused files and exports surfaced by knip and fallow
            - Preview fallow auto-fix candidates with `fallow fix --dry-run`
            - Optionally apply fallow auto-fix when `FALLOW_APPLY=true`
            - Remove unused dependencies from package manifests via existing clean tooling

            ## 🧪 Testing

            1. Review removed files to ensure nothing critical was
               deleted
            2. Verify manually that no breaking changes are introduced

            ## 🔗 Related

            - *Generated by [✂️ Remove Deprecations](${{ format(
              'https://github.com/{0}/actions/workflows/remove-deprecations.yml',
              github.repository) }})*
          branch: chore/monorepo-remove-deprecations
          delete-branch: true
          reviewers: JimmyPaolini
          labels: |
            automated
