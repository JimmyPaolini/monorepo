name: ✂️ Remove Deprecations

on:
  schedule:
    - cron: 0 6 * * 0 # Weekly Sunday 6am UTC
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  remove-deprecations:
    name: ✂️ Remove Deprecations
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🕋 Setup Monorepo
        uses: ./.github/actions/setup-monorepo

      - name: 🗑️ Close Previous PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list \
            --head chore/monorepo-remove-deprecations \
            --json number --jq '.[0].number')
          if [[ -n "$PR_NUMBER" ]]; then
            gh pr close "$PR_NUMBER" --delete-branch \
              --comment "Closed in favor of by new cleanup run"
          fi

      - name: ✂️ Remove Deprecations
        run: |
          pnpm exec nx run monorepo:clean:write || true

      - name: 📝 Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(monorepo): ✂️ Remove deprecations"
          title: "chore(monorepo): ✂️ Remove deprecations"
          body: |
            ## 🌰 Summary

            Automated removal of deprecated code, files, and dependencies.

            ## 📝 Details

            - Remove unused files detected by knip
            - Remove unused exports from files detected by knip
            - Remove unused dependencies from package.json files
              detected by knip

            ## 🧪 Testing

            1. Review removed files to ensure nothing critical was
               deleted
            2. Verify manually that no breaking changes are introduced

            ## 🔗 Related

            - *Generated by [✂️ Remove Deprecations](${{ format(
              'https://github.com/{0}/actions/workflows/remove-deprecations.yml',
              github.repository) }})*
          branch: chore/monorepo-remove-deprecations
          delete-branch: true
          reviewers: JimmyPaolini
          labels: |
            automated
