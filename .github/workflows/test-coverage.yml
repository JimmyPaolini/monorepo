name: 🧑‍🔬 Test Coverage

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      verbose:
        description: Enable verbose Nx logging
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-coverage:
    name: 🧑‍🔬 Test Coverage
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🕋 Setup Monorepo
        uses: ./.github/actions/setup-monorepo

      - name: 🧪 Test Coverage
        env:
          NX_VERBOSE_LOGGING: ${{ inputs.verbose || false }}
        run: npx nx affected --target=test --parallel=3 --configuration=coverage

      - name: 📊 Upload Test Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: coverage/
          retention-days: 30
