name: 🤖 Trigger Copilot Agent

on:
  schedule:
    - cron: 0 9 * * 1 # Weekly Monday 9am UTC
  workflow_dispatch:
    inputs:
      prompt:
        description: Optional @copilot prompt override
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  trigger-copilot-agent:
    name: 🤖 Trigger Copilot Agent
    runs-on: ubuntu-latest

    steps:
      - name: 🔍 Resolve Trigger Configuration
        id: config
        env:
          ISSUE_NUMBER: ${{ vars.COPILOT_CRON_ISSUE_NUMBER }}
          PROMPT_INPUT: ${{ github.event.inputs.prompt }}
          PROMPT_VAR: ${{ vars.COPILOT_CRON_PROMPT }}
        run: |
          if [[ -z "$ISSUE_NUMBER" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            {
              echo "reason<<EOF"
              echo "Set COPILOT_CRON_ISSUE_NUMBER repository variable to"
              echo "enable scheduled agent triggers."
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! [[ "$ISSUE_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "COPILOT_CRON_ISSUE_NUMBER must be a numeric issue number." >&2
            exit 1
          fi

          PROMPT="$PROMPT_INPUT"
          if [[ -z "$PROMPT" ]]; then
            PROMPT="$PROMPT_VAR"
          fi
          if [[ -z "$PROMPT" ]]; then
            PROMPT='@copilot Please run the scheduled task for this'
            PROMPT+=' issue and share progress updates.'
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          {
            echo "prompt<<EOF"
            echo "$PROMPT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: ℹ️ Skip When Not Configured
        if: steps.config.outputs.enabled != 'true'
        run: echo "${{ steps.config.outputs.reason }}"

      - name: 💬 Post Scheduled @copilot Comment
        if: steps.config.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPOSITORY="${{ github.repository }}"
          ISSUE_NUMBER="${{ steps.config.outputs.issue_number }}"
          COMMENT_ENDPOINT="repos/${REPOSITORY}/issues/${ISSUE_NUMBER}"
          COMMENT_ENDPOINT+="/comments"

          gh api \
            --method POST \
            "$COMMENT_ENDPOINT" \
            -f body="${{ steps.config.outputs.prompt }}"
