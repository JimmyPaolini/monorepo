name: 🧑‍💻 Code Analysis

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      verbose:
        description: Enable verbose Nx logging
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-analysis:
    name: 🧑‍💻 Code Analysis
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🕋 Setup Monorepo
        uses: ./.github/actions/setup-monorepo

      - name: 🧑‍💻 Code Analysis
        env:
          NX_VERBOSE_LOGGING: ${{ inputs.verbose || false }}
        run: pnpm exec nx affected --target=code-analysis

      - name: 📊 Upload Type Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: type-coverage-reports
          path: |
            applications/**/type-coverage-report.txt
            packages/**/type-coverage-report.txt
            tools/**/type-coverage-report.txt
          retention-days: 30
