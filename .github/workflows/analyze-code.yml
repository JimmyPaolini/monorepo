name: 🧑‍💻 Analyze Code

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      verbose:
        description: Enable verbose Nx logging
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-code:
    name: 🧑‍💻 Analyze Code
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🕋 Setup Monorepo
        uses: ./.github/actions/setup-monorepo

      - name: 🧑‍💻 Analyze Code
        env:
          NX_PARALLEL: 3
          NX_VERBOSE_LOGGING: ${{ inputs.verbose || false }}
        run: pnpm exec nx affected --target=analyze-code

      - name: 📊 Upload Type Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: type-coverage-reports
          path: |
            applications/**/type-coverage-report.txt
            packages/**/type-coverage-report.txt
            tools/**/type-coverage-report.txt
          retention-days: 30

      - name: 🌾 Generate Fallow Config
        if: always()
        run: pnpm exec nx run monorepo:fallow-config

      - name: 🌾 Fallow Dead Code (advisory)
        if: always()
        continue-on-error: true
        run: |
          pnpm exec nx run monorepo:fallow-dead-code -- --format json > fallow-dead-code.json 2>&1 || true

      - name: 🌾 Fallow Health (advisory)
        if: always()
        continue-on-error: true
        run: |
          pnpm exec nx run monorepo:fallow-health -- --format json > fallow-health.json 2>&1 || true

      - name: 🌾 Fallow Audit — PR Regression Gate (advisory)
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          pnpm exec nx run monorepo:fallow-audit -- --format json > fallow-audit.json 2>&1 || true

      - name: 📊 Upload Fallow Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fallow-reports
          path: |
            fallow-dead-code.json
            fallow-health.json
            fallow-audit.json
          if-no-files-found: ignore
          retention-days: 30
