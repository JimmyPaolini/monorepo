name: 🕋 Setup Monorepo
description: |
  Nx monorepo setup with pnpm, node, and cache management
  (requires checkout first)

runs:
  using: composite
  steps:
    - name: 📦 Setup pnpm
      uses: pnpm/action-setup@v4

    - name: 🟢 Setup node
      uses: actions/setup-node@v4
      with:
        node-version-file: .nvmrc
        cache: pnpm

    - name: 🎯 Set Nx SHAs
      uses: nrwl/nx-set-shas@v4

    - name: 🗃️ Configure Nx Cache
      run: |
        echo "NX_DEFAULT_OUTPUT_STYLE=static" >> $GITHUB_ENV
      shell: bash

    - name: 🔧 Setup Homebrew
      uses: Homebrew/actions/setup-homebrew@main

    - name: 🍺 Install Homebrew tools
      run: brew install gitleaks --quiet
      shell: bash

    - name: 🦉 Install squawk
      run: pnpm add -g squawk-cli
      shell: bash

    - name: ♻️ Sync Nx Cache
      uses: actions/cache@v4
      with:
        path: .nx/cache
        key: |
          nx-cache-${{ runner.os }}-${{ hashFiles(
          '**/pnpm-lock.yaml') }}-${{ github.sha }}
        restore-keys: |
          nx-cache-${{ runner.os }}-${{ hashFiles(
          '**/pnpm-lock.yaml') }}-
          nx-cache-${{ runner.os }}-

    - name: 🌌 Setup uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        cache-dependency-glob: "**/pyproject.toml"
        add-problem-matchers: "false"

    - name: 🐍 Install Python Dependencies
      run: uv sync --frozen --quiet --project applications/affirmations
      shell: bash

    - name: 📚 Install Node Dependencies
      run: pnpm install --frozen-lockfile --reporter=silent
      shell: bash
