name: monorepo
services:
  caelundas:
    build:
      context: .
      dockerfile: applications/caelundas/Dockerfile
    image: caelundas
    container_name: caelundas

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - 11434:11434
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: 1m
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_NO_CLOUD: "1"
      OLLAMA_FLASH_ATTENTION: "1"
    deploy:
      resources:
        reservations:
          memory: 4g
    healthcheck:
      test: [CMD, curl, -f, http://localhost:11434/api/version]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - 3001:8080
    volumes:
      - open-webui_data:/app/backend/data
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      ENABLE_WEBSOCKET_SUPPORT: "false"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: [CMD, curl, -f, http://localhost:8080/health]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - 8889:8080
    volumes:
      - ${LOCAL_WORKSPACE_FOLDER}/applications/affirmations/config/searxng:/etc/searxng
    environment:
      SEARXNG_BASE_URL: http://localhost:8889
    healthcheck:
      test: [CMD, wget, -qO-, http://localhost:8080/]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    restart: unless-stopped

volumes:
  ollama_data:
  open-webui_data:
